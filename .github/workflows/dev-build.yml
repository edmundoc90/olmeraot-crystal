name: Dev Build and Deploy

on:
  push:
    branches: [ dev ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'docker/Dockerfile.dev'
      - 'docker/docker-compose*.yml'
      - 'start.sh'
      - 'schema.sql'
  pull_request:
    branches: [ dev ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'docker/Dockerfile.dev'
      - 'docker/docker-compose*.yml'
      - 'start.sh'
      - 'schema.sql'

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/olmeraot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OVERRIDES_REPO_TOKEN }}

      - name: Set SHORT_SHA
        id: short_sha
        run: |
          echo "value=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image (optimized Dockerfile.dev)
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.dev
          target: prod
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:dev-${{ steps.short_sha.outputs.value }}

      - name: Validate and record image digest
        id: image_meta
        run: |
          SHORT_SHA="${{ steps.short_sha.outputs.value }}"
          if [ -z "${{ steps.build.outputs.digest }}" ]; then
            echo "Missing Docker image digest"
            exit 1
          fi
          IMAGE_REF="${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"
          echo "image_ref=$IMAGE_REF" >> $GITHUB_OUTPUT
          printf '{"image":"%s","image_tag":"%s","image_id":"%s","commit":"%s"}' "$IMAGE_REF" "${{ env.IMAGE_REPOSITORY }}:dev-$SHORT_SHA" "${{ steps.build.outputs.digest }}" "$GITHUB_SHA" > dev-image-$SHORT_SHA.json

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-image-${{ steps.short_sha.outputs.value }}
          path: dev-image-${{ steps.short_sha.outputs.value }}.json

      - name: Deploy to DEV host
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_DEV_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: OVERRIDES_REPO_TOKEN
          script: |
            set -euo pipefail
            cd /opt/olmera/dev/repo
            git fetch --prune origin "+refs/heads/dev:refs/remotes/origin/dev"
            git checkout -B dev origin/dev
            git reset --hard origin/dev
            bash overrides/ops/olmera-deploy.sh --env dev --image-digest "${{ steps.image_meta.outputs.image_ref }}" --release-id "dev-${{ steps.short_sha.outputs.value }}"
