name: QA Build and Deploy

on:
  push:
    branches: [ qa ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'docker/Dockerfile.dev'
      - 'docker/docker-compose*.yml'
      - 'start.sh'
      - 'schema.sql'
  pull_request:
    branches: [ qa ]
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - 'docker/Dockerfile.dev'
      - 'docker/docker-compose*.yml'
      - 'start.sh'
      - 'schema.sql'

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/olmeraot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.OVERRIDES_REPO_TOKEN }}

      - name: Set SHORT_SHA
        run: |
          echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image (optimized Dockerfile.dev)
        id: build
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/Dockerfile.dev
          target: prod
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:qa-${{ env.SHORT_SHA }}

      - name: Validate and record image digest
        run: |
          if [ -z "${{ steps.build.outputs.digest }}" ]; then
            echo "Missing Docker image digest"
            exit 1
          fi
          IMAGE_REF="${{ env.IMAGE_REPOSITORY }}@${{ steps.build.outputs.digest }}"
          echo "IMAGE=${{ env.IMAGE_REPOSITORY }}:qa-${SHORT_SHA}" >> $GITHUB_ENV
          echo "IMAGE_DIGEST=${{ steps.build.outputs.digest }}" >> $GITHUB_ENV
          echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_ENV
          printf '{"image":"%s","image_tag":"%s","image_id":"%s","commit":"%s"}' "${IMAGE_REF}" "${IMAGE}" "${IMAGE_DIGEST}" "${GITHUB_SHA}" > qa-image-${SHORT_SHA}.json

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-image-${{ env.SHORT_SHA }}
          path: qa-image-${{ env.SHORT_SHA }}.json

      - name: Deploy to QA host
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_QA_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            /usr/local/bin/olmera-deploy.sh --env qa --image-digest "${{ env.IMAGE_REF }}" --release-id "qa-${{ env.SHORT_SHA }}"
