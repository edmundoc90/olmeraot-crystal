name: Prod Activate (manual)

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release id to activate (or use "pending")'
        required: false

jobs:
  activate:
    runs-on: ubuntu-latest
    steps:
      - name: Activate release on PROD host
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_PROD_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            /usr/local/bin/olmera-activate-release.sh --release-id "${{ github.event.inputs.release_id || 'pending' }}" --operator "${{ github.actor }}"
